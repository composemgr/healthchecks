# nginx proxy address - http://172.17.0.1:8098

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  healthchecks:
    image: healthchecks/healthchecks:latest
    container_name: healthchecks-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - healthchecks
    ports:
      - "8098:8098"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./rootfs/data/healthchecks:/data
      - ./rootfs/config/healthchecks:/config
    depends_on:
      - healthchecks-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8098"]
      interval: 30s
      timeout: 10s
      retries: 3

  healthchecks-db:
    image: postgres:16-alpine
    container_name: healthchecks-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - healthchecks
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-healthchecks}
      POSTGRES_USER: ${DB_USER_NAME:-healthchecks}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./rootfs/data/db/postgres/healthchecks:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${{POSTGRES_USER}} -d $${{POSTGRES_DB}}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  healthchecks:
    external: false
